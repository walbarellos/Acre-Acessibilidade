<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Acre Acessível</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fdfdfb;
      color: #1b1b1b;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hostname {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #eef6f0;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
    }
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #1b4332;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    .field-label {
      font-size: 11px;
      color: #666;
      margin: 12px 0 4px;
      display: block;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 9px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }
    .save-btn {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      background: #1b4332;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .save-btn:hover { background: #163a2a; }
    .hint {
      font-size: 10.5px;
      color: #888;
      margin-top: 8px;
      line-height: 1.4;
    }
    .status-msg {
      font-size: 11px;
      color: #1b4332;
      margin-top: 6px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <h1>🦫 Acre Acessível</h1>
  <div class="hostname" id="hostnameLabel">carregando...</div>

  <div class="toggle-row">
    <span>Ativar neste site</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <label class="field-label" for="backendInput">URL do backend de TTS (opcional)</label>
  <input type="text" id="backendInput" placeholder="https://api.seudominio.com" />
  <button class="save-btn" id="saveBackendBtn">Salvar URL do backend</button>
  <div class="status-msg" id="statusMsg"></div>

  <p class="hint">
    Deixe em branco se não tiver um backend próprio — o widget usa a voz nativa
    do navegador. A URL só é necessária para o fallback de voz neural em sistemas
    sem voz em português instalada.
  </p>

  <script src="popup.js"></script>
</body>
</html>
